services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_BUILD_ID: ${APP_BUILD_ID:-dev}
    container_name: modernity-gate
    # Ports: use docker-compose.local.yml (dev) or docker-compose.prod.yml (VPS)
    env_file:
      - .env.production
    environment:
      PORT: 9000
      HOSTNAME: 0.0.0.0
      DATABASE_URL: file:/app/prisma/prod.db
      SHOW_DEMO_ACCOUNTS: "true"
    volumes:
      - app-data:/app/prisma
      - uploads:/app/public/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9000/login"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  app-data:
  uploads:
